<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitoreo DevOps</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1e1e1e; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 50px; 
        }
        .card { 
            background: #2d2d2d; 
            padding: 20px; 
            border-radius: 10px; 
            border: 1px solid #444; 
            width: 95%;
            max-width: 850px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { margin-top: 0; color: #007bff; }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background: #0056b3; }
        pre { 
            background: #000; 
            padding: 15px; 
            border-radius: 5px; 
            margin-top: 20px; 
            font-size: 14px; 
            color: #0f0; 
            border: 1px solid #333;
            white-space: pre-wrap;       
            word-wrap: break-word;      
            line-height: 1.5;           
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Panel de Control</h2>
        <button id="btnActualizar">Ver Recursos Hardware</button>
        <pre id="resultado">Esperando datos...</pre>
    </div>

    <script>
        document.getElementById('btnActualizar').addEventListener('click', async () => {
            const res = await fetch('/api/status');
            const datos = await res.json();
            
            document.getElementById('resultado').innerText = 
                `${datos.cpu}\n${datos.ram}\n${datos.disco}`;
        });
    </script>
</body>
</html>
